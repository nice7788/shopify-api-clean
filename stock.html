<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>榴槤刺蝟｜榴槤即時供應雷達</title>

  <style>
    :root {
      --bg: #fffdf8;
      --text: #2d2a26;
      --sub: #7a7368;
      --line: #efe4c8;

      --hero-bg: linear-gradient(180deg, #fff4bf 0%, #fff9e7 100%);

      --shadow: 0 14px 34px rgba(80, 60, 20, 0.08);

      --low-bg: #fff5df;
      --low-text: #cc8a00;

      --out-bg: #fff1f1;
      --out-text: #c54c4c;

      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top left, #fff7cf 0%, transparent 30%),
        radial-gradient(circle at top right, #fff2d8 0%, transparent 24%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .hero {
      background: var(--hero-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 24px 20px;
      box-shadow: var(--shadow);
    }

    .brand-chip {
      background: #ffeaa1;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      display: inline-block;
      margin-bottom: 12px;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .hero-sub {
      margin-top: 6px;
      color: var(--sub);
    }

    .hero-right {
      text-align: right;
    }

    .pill {
      background: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 900;
      border: 1px solid #eadfca;
    }

    .hero-link {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #7b715f;
      text-decoration: none;
    }

    .guide {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fff7e8;
      border: 1px solid #efd7a8;
      font-weight: 800;
      color: #b86e00;
    }

    .section {
      margin-top: 18px;
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .location-card {
      border: 1px solid #eee4d4;
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 14px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(6px);}
      to { opacity:1; transform: translateY(0);}
    }

    .location-top {
      display: flex;
      justify-content: space-between;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .tag.low_stock {
      background: var(--low-bg);
      color: var(--low-text);
    }

    .tag.out_of_stock {
      background: var(--out-bg);
      color: var(--out-text);
    }

    .stock-main {
      font-weight: 900;
      margin-top: 6px;
    }

    .stock-copy {
      color: var(--sub);
      font-size: 14px;
    }

    .cta-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 900;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: #2d2a26;
      color: #fff;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .btn-secondary {
      background: #fff7e8;
      border: 1px solid #efd7a8;
      color: #9a6a00;
    }

    .btn-soft {
      background: #fff;
      border: 1px solid #eadfca;
      color: #8a8072;
    }

    .meta {
      font-size: 12px;
      color: #938b80;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin-top: 16px;
      color: #8e8578;
    }
  </style>
</head>

<body>
<div class="wrap">
  <div id="app">載入中…</div>
</div>

<script>
const PRODUCT_URL = "https://nicedurian.com/products/dur-ff-001";

const STORE_MAP = {
  "花蓮｜美崙起源": "https://maps.app.goo.gl/Kzuxjo7p7Nzf1AB97?g_st=ic",
  "花蓮｜花創園區": "https://maps.app.goo.gl/LWeLsQ4zJJqStBsk7?g_st=ic"
};

function goProduct(){
  window.open(PRODUCT_URL, "_blank");
}

function getHeroText(item){
  const locs = item.locations;
  const available = locs.filter(l=>l.available>0);
  const sold = locs.filter(l=>l.available<=0);

  if(!available.length) return "今天兩間門市都被吃光光了…";

  if(sold.length){
    return `${sold.map(s=>s.location_name.replace("花蓮｜","")).join("、")}被吃光了，現在只剩${available.map(a=>a.location_name.replace("花蓮｜","")).join("、")}還有。`;
  }

  return "今天兩間門市都有貨。";
}

function render(data){
  const item = data.item;

  const html = `
  <div class="hero">
    <div class="brand-chip">榴槤刺蝟 Nice Durian</div>

    <div class="hero-head">
      <div>
        <h1>${item.title}</h1>
        <div class="hero-sub">榴槤即時供應雷達</div>
      </div>

      <div class="hero-right">
        <div class="pill">${item.total_display_text}</div>
        <a class="hero-link" href="https://nicedurian.com" target="_blank">探索榴槤宇宙 →</a>
      </div>
    </div>

    <div class="guide">${getHeroText(item)}</div>
  </div>

  <div class="section">
    <div class="section-head">
      <b>魔法商店庫存</b>
      <span style="font-size:12px;color:#999;">以目前頁面為準</span>
    </div>

    ${item.locations.map(loc=>{
      const soldOut = loc.available<=0;

      return `
      <div class="location-card">
        <div class="location-top">
          <b>${loc.location_name}</b>
          <span class="tag ${loc.status_code}">${loc.status}</span>
        </div>

        <div class="stock-main">
          ${soldOut ? "吃光光了…" : `剩 ${loc.available} 盒`}
        </div>

        <div class="stock-copy">
          ${soldOut ? "今天真的被吃光光了…" : "真的快被吃光了。"}
        </div>

        <div class="cta-row">
          ${
            soldOut
            ? `<a class="btn btn-soft" href="${STORE_MAP[loc.location_name]}" target="_blank">看看門市位置</a>`
            : `<a class="btn btn-primary" href="${STORE_MAP[loc.location_name]}" target="_blank">前往這間門市</a>`
          }

          <button class="btn btn-secondary" onclick="goProduct()">留一盒給我</button>
        </div>

        <div class="meta">最後更新：${loc.updated_at.replace("T"," ").replace("+08:00","")}</div>
      </div>
      `;
    }).join("")}
  </div>

  <div class="footer">
    最後查詢時間：${data.fetched_at_taipei}
  </div>
  `;

  document.getElementById("app").innerHTML = html;
}

fetch("/.netlify/functions/get-stock")
.then(r=>r.json())
.then(render)
.catch(()=>{
  document.getElementById("app").innerHTML="讀取失敗";
});
</script>
</body>
</html>
