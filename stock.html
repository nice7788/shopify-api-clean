<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>榴槤刺蝟｜榴槤即時供應雷達</title>

<style>
:root {
  --bg: #fffdf8;
  --card: #ffffff;
  --text: #2d2a26;
  --sub: #7a7368;
  --line: #efe4c8;
  --hero: linear-gradient(180deg,#fff4bf,#fff9e7);
  --shadow: 0 14px 34px rgba(80,60,20,0.08);
}

body {
  margin:0;
  font-family:-apple-system,"Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap {
  max-width:720px;
  margin:auto;
  padding:20px;
}

/* HERO */
.hero {
  background:var(--hero);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  box-shadow:var(--shadow);
}

.hero-head {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.hero-title h1 {
  margin:0;
  font-size:28px;
}

.hero-sub {
  color:var(--sub);
  font-size:14px;
  margin-top:6px;
}

/* 右上區 */
.hero-right {
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
}

.total-pill {
  background:#fff;
  padding:8px 14px;
  border-radius:999px;
  font-weight:800;
  border:1px solid #eadfca;
}

/* 探索宇宙（低干擾） */
.hero-link {
  font-size:13px;
  color:#7a6b4a;
  text-decoration:none;
}

.hero-link:hover {
  text-decoration:underline;
}

/* 提示框 */
.guide {
  margin-top:14px;
  padding:12px 14px;
  border-radius:14px;
  background:#fff7e8;
  border:1px solid #efd7a8;
  font-size:14px;
  font-weight:700;
}

/* SECTION */
.section {
  margin-top:18px;
  background:#fff;
  border-radius:20px;
  padding:18px;
  border:1px solid #eee;
  box-shadow:var(--shadow);
}

.section-head {
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
}

.section-title {
  font-weight:900;
}

/* 卡片 */
.card {
  border:1px solid #eee;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

.card-top {
  display:flex;
  justify-content:space-between;
}

.tag {
  font-size:12px;
  padding:4px 10px;
  border-radius:999px;
  background:#fff4e5;
}

.stock-main {
  font-weight:900;
  margin-top:6px;
}

.stock-sub {
  font-size:13px;
  color:var(--sub);
}

/* 按鈕 */
.actions {
  margin-top:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn {
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
  text-decoration:none;
}

.btn-primary {
  background:#2d2a26;
  color:white;
}

.btn-soft {
  background:#fff7e8;
  border:1px solid #efd7a8;
  color:#9a6a00;
}

/* footer */
.footer {
  text-align:center;
  font-size:12px;
  margin-top:14px;
  color:#8e8578;
}
</style>
</head>

<body>
<div class="wrap">
  <div id="app">載入中…</div>
</div>

<script>
const PRODUCT_URL = "https://nicedurian.com/products/dur-ff-001";
const HOME_URL = "https://nicedurian.com";

const STORE_MAP = {
  "花蓮｜美崙起源":"https://maps.app.goo.gl/Kzuxjo7p7Nzf1AB97?g_st=ic",
  "花蓮｜花創園區":"https://maps.app.goo.gl/LWeLsQ4zJJqStBsk7?g_st=ic"
};

function render(data){
  const item = data.item;
  const guide = getGuide(item);

  document.getElementById("app").innerHTML = `
  
  <div class="hero">
    <div class="hero-head">
      
      <div class="hero-title">
        <h1>${item.title}</h1>
        <div class="hero-sub">榴槤即時供應雷達</div>
      </div>

      <div class="hero-right">
        <div class="total-pill">${item.total_display_text}</div>
        <a class="hero-link" href="${HOME_URL}" target="_blank">
          探索榴槤宇宙 →
        </a>
      </div>

    </div>

    <div class="guide">${guide}</div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">魔法商店庫存</div>
      <div style="font-size:12px;color:#aaa;">以目前頁面為準</div>
    </div>

    ${item.locations.map(loc => renderCard(loc)).join("")}
  </div>

  <div class="footer">
    最後查詢時間：${data.fetched_at_taipei}
  </div>
  `;
}

function renderCard(loc){
  const qty = loc.available;
  const map = STORE_MAP[loc.location_name];

  let text = qty > 0 ? `剩 ${qty} 盒` : "吃光光了…";
  let sub = qty > 0 ? "真的快被吃光了。" : "今天真的被吃光光了…";

  return `
  <div class="card">
    <div class="card-top">
      <strong>${loc.location_name}</strong>
      <span class="tag">${loc.status}</span>
    </div>

    <div class="stock-main">${text}</div>
    <div class="stock-sub">${sub}</div>

    <div class="actions">
      <a class="btn btn-primary" href="${map}" target="_blank">
        前往這間門市
      </a>

      <a class="btn btn-soft" href="${PRODUCT_URL}" target="_blank">
        留一盒給我
      </a>
    </div>
  </div>
  `;
}

function getGuide(item){
  const locs = item.locations;
  const available = locs.filter(l=>l.available>0);
  const sold = locs.filter(l=>l.available<=0);

  if(available.length===0){
    return "今天全部被吃光了…";
  }

  if(sold.length>0){
    return `⚠ ${sold.map(s=>s.location_name).join("、")} 被吃光了，現在只剩 ${available.map(a=>a.location_name).join("、")} 還有。`;
  }

  return "今天都有貨，可以放心前往。";
}

fetch('/.netlify/functions/get-stock')
.then(r=>r.json())
.then(render)
.catch(()=>{document.getElementById("app").innerHTML="載入失敗";});
</script>

</body>
</html>
