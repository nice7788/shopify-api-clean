<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>榴槤刺蝟｜今日庫存</title>
  <style>
    :root {
      --bg: #fffdf8;
      --card: #fffaf0;
      --card-white: #ffffff;
      --text: #2d2a26;
      --sub: #7a7368;
      --line: #efe4c8;
      --brand: #f4d35e;
      --brand-deep: #9a7b12;
      --ok-bg: #edf7ed;
      --ok-text: #2e7d32;
      --low-bg: #fff4e5;
      --low-text: #c77800;
      --out-bg: #fff0f0;
      --out-text: #c03b3b;
      --hero-bg: linear-gradient(180deg, #fff4bf 0%, #fff9e7 100%);
      --shadow: 0 14px 34px rgba(80, 60, 20, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top left, #fff7cf 0%, transparent 30%),
        radial-gradient(circle at top right, #fff2d8 0%, transparent 24%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .hero {
      background: var(--hero-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 24px 20px 22px;
      box-shadow: var(--shadow);
    }

    .brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 236, 157, 0.78);
      color: #7b6207;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .hero-sub {
      margin-top: 8px;
      color: var(--sub);
      font-size: 15px;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.78);
      border: 1px solid #eadfca;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 4px 14px rgba(120, 100, 40, 0.04);
    }

    .guide-box {
      margin-top: 16px;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 800;
      border: 1px solid #efd7a8;
      background: #fff7e8;
      color: #b86e00;
    }

    .guide-box.success {
      border-color: #d8ebd8;
      background: #f4fbf4;
      color: #2e7d32;
    }

    .guide-box.out {
      border-color: #f2d1d1;
      background: #fff5f5;
      color: #c03b3b;
    }

    .section {
      margin-top: 18px;
      background: var(--card-white);
      border: 1px solid #eee6d8;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px 16px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .location-list {
      display: grid;
      gap: 14px;
    }

    .location-card {
      border: 1px solid #eee4d4;
      border-radius: var(--radius-md);
      background: #fffdfa;
      padding: 16px;
    }

    .location-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .location-name {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.3;
    }

    .tag {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .tag.in_stock {
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .tag.low_stock {
      background: var(--low-bg);
      color: var(--low-text);
    }

    .tag.out_of_stock {
      background: var(--out-bg);
      color: var(--out-text);
    }

    .stock-main {
      font-size: 17px;
      font-weight: 900;
      margin: 8px 0 2px;
    }

    .stock-copy {
      font-size: 14px;
      color: var(--sub);
      margin: 0;
    }

    .meta {
      margin-top: 8px;
      font-size: 12px;
      color: #938b80;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: #8e8578;
      line-height: 1.8;
    }

    .loading,
    .error {
      background: white;
      border: 1px solid #eee4d4;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 36px 20px;
      text-align: center;
      margin-top: 24px;
    }

    .error {
      color: #b94141;
    }

    @media (max-width: 480px) {
      .hero h1 {
        font-size: 28px;
      }

      .pill {
        font-size: 14px;
      }

      .location-top {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="app">
      <div class="loading">榴槤庫存感應中…</div>
    </div>
  </div>

  <script>
    const DEFAULT_SKU = "DUR-FF-001";

    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getStoreFlavor(loc) {
      const qty = Number(loc.available) || 0;

      if (qty <= 0) {
        return {
          title: "吃光光了…",
          sub: "這裡今天被榴槤控搶先一步。",
        };
      }

      if (qty <= 3) {
        return {
          title: `剩 ${qty} 盒`,
          sub: "還有機會，想吃要快。",
        };
      }

      return {
        title: `剩 ${qty} 盒`,
        sub: "還買得到，可以放心衝。",
      };
    }

    function getHeroGuide(item) {
      const locations = Array.isArray(item.locations) ? item.locations : [];
      const availableStores = locations.filter((loc) => (Number(loc.available) || 0) > 0);
      const soldOutStores = locations.filter((loc) => (Number(loc.available) || 0) <= 0);

      if (availableStores.length === 0) {
        return {
          className: "out",
          text: "今天兩間門市都被吃光光了…",
        };
      }

      if (soldOutStores.length > 0 && availableStores.length > 0) {
        const availableNames = availableStores.map((loc) => loc.location_name.replace("花蓮｜", ""));
        const soldOutNames = soldOutStores.map((loc) => loc.location_name.replace("花蓮｜", ""));
        return {
          className: "",
          text: `⚠ ${soldOutNames.join("、")} 暫時吃光光了，建議前往 ${availableNames.join("、")}。`,
        };
      }

      return {
        className: "success",
        text: "今天兩間門市都有貨，可以選離你比較近的地方。",
      };
    }

    async function loadStock() {
      const app = document.getElementById("app");
      const sku = getQueryParam("sku") || DEFAULT_SKU;

      try {
        const res = await fetch(`/.netlify/functions/get-stock?sku=${encodeURIComponent(sku)}`);
        const data = await res.json();

        if (!res.ok || !data.success || !data.item) {
          app.innerHTML = `
            <div class="error">
              今天還感應不到這顆榴槤。<br>
              請稍後再試一次。
            </div>
          `;
          return;
        }

        const item = data.item;
        const locations = Array.isArray(item.locations) ? item.locations : [];
        const heroGuide = getHeroGuide(item);

        const locationHtml = locations.map((loc) => {
          const flavor = getStoreFlavor(loc);
          return `
            <div class="location-card">
              <div class="location-top">
                <h3 class="location-name">${escapeHtml(loc.location_name)}</h3>
                <span class="tag ${escapeHtml(loc.status_code)}">${escapeHtml(loc.status)}</span>
              </div>
              <div class="stock-main">${escapeHtml(flavor.title)}</div>
              <p class="stock-copy">${escapeHtml(flavor.sub)}</p>
              <div class="meta">庫存更新：${escapeHtml(loc.updated_at || "-")}</div>
            </div>
          `;
        }).join("");

        app.innerHTML = `
          <div class="hero">
            <div class="brand-chip">榴槤刺蝟 Nice Durian</div>
            <h1>${escapeHtml(item.title)}</h1>
            <div class="hero-sub">即時門市庫存查詢</div>

            <div class="summary">
              <div class="pill">${escapeHtml(item.total_display_text)}</div>
              <div class="pill">${escapeHtml(item.total_status)}</div>
            </div>

            <div class="guide-box ${escapeHtml(heroGuide.className)}">
              ${escapeHtml(heroGuide.text)}
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">門市庫存</h2>
            <div class="location-list">
              ${locationHtml}
            </div>
          </div>

          <div class="footer">
            本次查詢時間：${escapeHtml(data.fetched_at_taipei || "-")}<br>
            商品資料更新：${escapeHtml(item.updated_at || "-")}
          </div>
        `;
      } catch (error) {
        app.innerHTML = `
          <div class="error">
            庫存感應失敗，請稍後再試。<br>
            ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    loadStock();
  </script>
</body>
</html>
