<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>榴槤刺蝟｜榴槤即時供應雷達</title>

  <style>
    :root {
      --bg: #fffdf8;
      --text: #2d2a26;
      --sub: #7a7368;
      --line: #efe4c8;
      --hero-bg: linear-gradient(180deg, #fff4bf 0%, #fff9e7 100%);
      --shadow: 0 14px 34px rgba(80, 60, 20, 0.08);

      --low-bg: #fff5df;
      --low-text: #cc8a00;

      --out-bg: #fff1f1;
      --out-text: #c54c4c;

      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top left, #fff7cf 0%, transparent 30%),
        radial-gradient(circle at top right, #fff2d8 0%, transparent 24%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .hero {
      background: var(--hero-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 24px 20px;
      box-shadow: var(--shadow);
    }

    .brand-chip {
      background: #ffeaa1;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      display: inline-block;
      margin-bottom: 12px;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .hero-title-block {
      min-width: 0;
      flex: 1;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .hero-sub {
      margin-top: 6px;
      color: var(--sub);
      font-size: 14px;
    }

    .hero-right {
      text-align: right;
      flex-shrink: 0;
    }

    .pill {
      background: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 900;
      border: 1px solid #eadfca;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
      white-space: nowrap;
      display: inline-block;
    }

    .hero-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      color: #7b715f;
      text-decoration: none;
      transition: 0.2s;
    }

    .hero-link:hover {
      transform: translateX(3px);
      color: #000;
    }

    .guide {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fff7e8;
      border: 1px solid #efd7a8;
      font-weight: 800;
      color: #b86e00;
    }

    .guide.out {
      background: #fff4f1;
      border-color: #f1d5d5;
      color: #b45a4a;
    }

    .hero-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .section {
      margin-top: 18px;
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid #f1eadc;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
      margin: 0;
    }

    .section-sub {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
    }

    .location-card {
      border: 1px solid #eee4d4;
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 14px;
      background: #fffdfa;
      transition: 0.2s;
    }

    .location-card:last-child {
      margin-bottom: 0;
    }

    .location-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }

    .location-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .location-name {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.3;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .tag.low_stock {
      background: var(--low-bg);
      color: var(--low-text);
    }

    .tag.out_of_stock {
      background: var(--out-bg);
      color: var(--out-text);
    }

    .stock-main {
      font-weight: 900;
      font-size: 17px;
      margin-top: 8px;
    }

    .stock-copy {
      color: var(--sub);
      font-size: 14px;
      margin-top: 2px;
    }

    .cta-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 900;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: #2d2a26;
      color: #fff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #fff7e8;
      border: 1px solid #efd7a8;
      color: #9a6a00;
    }

    .btn-secondary:hover {
      background: #fff1cc;
    }

    .btn-soft {
      background: #fff;
      border: 1px solid #eadfca;
      color: #aaa;
    }

    .meta {
      font-size: 12px;
      color: #938b80;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin-top: 16px;
      color: #8e8578;
    }

    .loading,
    .error {
      background: white;
      border: 1px solid #eee4d4;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 36px 20px;
      text-align: center;
      margin-top: 24px;
    }

    .error {
      color: #b94141;
    }

    @media (max-width: 640px) {
      .hero-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero-right {
        text-align: left;
      }
    }

    @media (max-width: 520px) {
      .section-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 480px) {
      .hero h1 {
        font-size: 28px;
      }

      .location-top {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="app">
      <div class="loading">榴槤供應雷達感應中…</div>
    </div>
  </div>

  <script>
    const PRODUCT_URL = "https://nicedurian.com/products/dur-ff-001";
    const HOME_URL = "http://durian.com.tw";

    const STORE_MAP = {
      "花蓮｜美崙起源": "https://maps.app.goo.gl/Kzuxjo7p7Nzf1AB97?g_st=ic",
      "花蓮｜花創園區": "https://cdn.shopify.com/s/files/1/0738/2040/5954/files/IMG_7665.jpg?v=1776689093"
    };

    // 之後若你有更精準的 LIFF / 官方 LINE 對話連結，只要改這裡
    const LINE_NOTIFY_URL = "https://line.me/R/ti/p/@nicedurian";

    function goProduct() {
      window.open(PRODUCT_URL, "_blank", "noopener,noreferrer");
    }

    function goLineNotify() {
      window.open(LINE_NOTIFY_URL, "_blank", "noopener,noreferrer");
    }

    function getHeroText(item) {
      const locs = item.locations || [];
      const available = locs.filter(l => l.available > 0);
      const sold = locs.filter(l => l.available <= 0);

      if (!available.length) {
        return "今天被搶光了…但下一批很快就會出現 👀";
      }

      if (sold.length) {
        return `${sold.map(s => s.location_name.replace("花蓮｜", "")).join("、")}被吃光了，現在只剩${available.map(a => a.location_name.replace("花蓮｜", "")).join("、")}還有。`;
      }

      return "今天兩間門市都有貨。";
    }

    function formatUpdatedAt(value) {
      if (!value) return "-";
      return String(value).replace("T", " ").replace("+08:00", "");
    }

    function renderHeroActions(allSoldOut) {
      if (!allSoldOut) return "";

      return `
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="goLineNotify()">補貨叫我</button>
          <a class="btn btn-secondary" href="${HOME_URL}" target="_blank" rel="noopener noreferrer">探索榴槤宇宙</a>
        </div>
      `;
    }

    function render(data) {
      const item = data.item;

      if (!item) {
        document.getElementById("app").innerHTML = `
          <div class="error">找不到這顆榴槤，請稍後再試。</div>
        `;
        return;
      }

      const locations = item.locations || [];
      const allSoldOut = locations.length > 0 && locations.every(loc => loc.available <= 0);

      document.getElementById("app").innerHTML = `
        <div class="hero">
          <div class="brand-chip">榴槤刺蝟 Nice Durian</div>

          <div class="hero-head">
            <div class="hero-title-block">
              <h1>${item.title}</h1>
              <div class="hero-sub">榴槤即時供應雷達</div>
            </div>

            <div class="hero-right">
              <div class="pill">${item.total_display_text}</div>
              ${!allSoldOut ? `<a class="hero-link" href="${HOME_URL}" target="_blank" rel="noopener noreferrer">探索榴槤宇宙 →</a>` : ""}
            </div>
          </div>

          <div class="guide ${allSoldOut ? "out" : ""}">
            ${getHeroText(item)}
          </div>

          ${renderHeroActions(allSoldOut)}
        </div>

        <div class="section">
          <div class="section-head">
            <h2 class="section-title">魔法商店庫存</h2>
            <span class="section-sub">以目前頁面為準</span>
          </div>

          ${locations.map(loc => {
            const soldOut = loc.available <= 0;

            return `
              <div class="location-card">
                <div class="location-top">
                  <div class="location-name">${loc.location_name}</div>
                  <span class="tag ${loc.status_code}">${loc.status}</span>
                </div>

                <div class="stock-main">
                  ${soldOut ? "吃光光了…" : `剩 ${loc.available} 盒`}
                </div>

                <div class="stock-copy">
                  ${soldOut ? "今天真的被吃光光了…" : "真的快被吃光了。"}
                </div>

                <div class="cta-row">
                  ${
                    soldOut
                      ? `<a class="btn btn-soft" href="${STORE_MAP[loc.location_name]}" target="_blank" rel="noopener noreferrer">看看門市位置</a>
                         <button class="btn btn-secondary" onclick="goLineNotify()">補貨通知我</button>`
                      : `<a class="btn btn-primary" href="${STORE_MAP[loc.location_name]}" target="_blank" rel="noopener noreferrer">前往這間門市</a>
                         <button class="btn btn-secondary" onclick="goProduct()">留一盒給我</button>`
                  }
                </div>

                <div class="meta">最後更新：${formatUpdatedAt(loc.updated_at)}</div>
              </div>
            `;
          }).join("")}
        </div>

        <div class="footer">
          最後查詢時間：${data.fetched_at_taipei}
        </div>
      `;
    }

    fetch("/.netlify/functions/get-stock")
      .then(r => r.json())
      .then(render)
      .catch(() => {
        document.getElementById("app").innerHTML = `
          <div class="error">讀取失敗，請稍後再試。</div>
        `;
      });
  </script>
</body>
</html>
